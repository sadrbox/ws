# Сборка десктоп-клиента (Tauri) под Windows.
#
# Собирать надо на Windows: нужен MSVC и WebView2. Кросс-компиляция с Linux требует
# отдельного toolchain и на практике ломается чаще, чем экономит время, — поэтому
# берём windows-раннер.
#
# Результат: установщики .exe (NSIS) и .msi в артефактах запуска.
# Фронт зашивается в бинарник (beforeBuildCommand: npm run build), API ходит по сети.
name: Desktop (Windows)

on:
  workflow_dispatch: # запуск вручную из вкладки Actions
  push:
    tags: ["v*"] # и на релизных тегах

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      # Сборка Rust долгая — кэшируем, иначе каждый запуск тратит минуты впустую.
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Build installers
        working-directory: frontend
        run: npm run tauri:build

      - uses: actions/upload-artifact@v4
        with:
          name: erp-desktop-windows
          path: |
            frontend/src-tauri/target/release/bundle/nsis/*.exe
            frontend/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
