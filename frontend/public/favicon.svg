<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Монитор — символ системы учёта -->
  <rect x="3" y="3" width="26" height="20" rx="3" fill="#1976D2" />
  <rect x="5" y="5" width="22" height="16" rx="1.5" fill="#E3F2FD" />
  <!-- Сетка таблицы -->
  <line x1="5" y1="11" x2="27" y2="11" stroke="#1976D2" stroke-width="0.8" opacity="0.35" />
  <line x1="5" y1="15.5" x2="27" y2="15.5" stroke="#1976D2" stroke-width="0.8" opacity="0.25" />
  <line x1="14" y1="5" x2="14" y2="21" stroke="#1976D2" stroke-width="0.8" opacity="0.25" />
  <!-- Галочка — «учтено» -->
  <polyline points="10,13 14,17 22,9" fill="none" stroke="#2E7D32" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Подставка -->
  <rect x="12" y="23" width="8" height="2" rx="1" fill="#1976D2" />
  <rect x="10" y="26" width="12" height="2" rx="1" fill="#1565C0" />
