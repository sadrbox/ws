<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- ТЁМНАЯ ТЕМА ВРЕМЕННО ОТКЛЮЧЕНА (WIP, см. E5): в module.scss ещё ~390
       хардкод-цветов не переключаются → невидимый текст. Форсим светлую тему для
       ВСЕХ: data-theme="light" перекрывает и @media(prefers-color-scheme:dark)
       (селектор :root:not([data-theme="light"])), и застрявший выбор в localStorage.
       Когда тема будет готова — вернуть чтение localStorage (закомментировано ниже)
       и раскомментировать <ThemeSwitcher/> в навбаре. -->
  <script>
    (function () {
      try {
        document.documentElement.setAttribute("data-theme", "light");
        // var t = localStorage.getItem("theme");
        // if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
      } catch (e) { }
    })();
  </script>
  <link rel="icon"
    type="image/svg+xml"
    href="/favicon.svg" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA: приложение устанавливается на устройство и открывается в своём окне,
       без адресной строки. Офлайн уже обеспечен: service worker кэширует статику,
       данные лежат в IndexedDB (см. services/registerSW + offlineDb). -->
  <link rel="manifest"
    href="/manifest.webmanifest" />
  <meta name="theme-color"
    content="#1976D2" />
  <meta name="application-name"
    content="Учёт" />
  <!-- iOS манифест не читает: иконку и режим standalone задаём отдельно. -->
  <link rel="apple-touch-icon"
    href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable"
    content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style"
    content="default" />
  <meta name="apple-mobile-web-app-title"
    content="Учёт" />
  <title>Система автоматизированного учета</title>
  <link rel="preconnect"
