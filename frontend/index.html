<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- Применяем выбранную тему ДО первой отрисовки — иначе вспышка светлой темы
       у пользователя, выбравшего тёмную. Без темы в localStorage — по системной
       (prefers-color-scheme отрабатывает сам в CSS). -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
      } catch (e) { }
    })();
  </script>
  <link rel="icon"
    type="image/svg+xml"
    href="/favicon.svg" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA: приложение устанавливается на устройство и открывается в своём окне,
       без адресной строки. Офлайн уже обеспечен: service worker кэширует статику,
       данные лежат в IndexedDB (см. services/registerSW + offlineDb). -->
  <link rel="manifest"
    href="/manifest.webmanifest" />
  <meta name="theme-color"
    content="#1976D2" />
  <meta name="application-name"
    content="Учёт" />
  <!-- iOS манифест не читает: иконку и режим standalone задаём отдельно. -->
  <link rel="apple-touch-icon"
    href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable"
    content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style"
    content="default" />
  <meta name="apple-mobile-web-app-title"
    content="Учёт" />
  <title>Система автоматизированного учета</title>
  <link rel="preconnect"
    href="https://fonts.googleapis.com" />
  <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet" />
</head>
<style>
  /* ── Семантические токены цвета для инлайновых стилей ──────────────────────
     Раньше эти намерения были разбросаны хардкодом: три разных «ошибочных»
     красных (#e53935/#dc3545/#dc2626), два «успешных» зелёных, два «внимание»
     оранжевых, плюс россыпь серых. Здесь — единый источник; инлайновые style={{}}
     ссылаются через var(--…). Значения тем задаются ниже (light по умолчанию,
     dark — под prefers-color-scheme; когда дойдёт черёд полной тёмной темы,
     останется только выверить контраст).
     --color-link совпадает с $colorPrimaryDark из styles/variables.scss. */
  :root {
    --color-link: #1c5fcb;      /* интерактивный акцент (= $colorPrimaryDark) */
    --text-secondary: #555555;  /* приглушённый основной текст */
    --text-muted: #999999;      /* подписи, плейсхолдеры */
    --text-faint: #bbbbbb;      /* самый тихий текст, «—» */
    --success: #1a7f37;         /* успех, положительная дельта */
    --success-fg: #145523;      /* текст на светло-зелёном фоне */
    --success-bg: #e6f4ea;
    --warning: #b35900;         /* внимание (акциз/незаполнено) */
    --warning-strong: #e65100;
    --danger: #d32f2f;          /* ошибка/удаление */
    --danger-fg: #6b1119;       /* текст на светло-красном фоне */
    --danger-bg: #fde2e4;
    --surface-muted: #f5f5f5;   /* нейтральная подложка блока */
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --color-link: #6ea8ff;
      --text-secondary: #c2c8d0;
      --text-muted: #8b93a1;
      --text-faint: #5f6773;
      --success: #4ade80;
      --success-fg: #bbf7d0;
      --success-bg: #123222;
      --warning: #f59e0b;
      --warning-strong: #fbbf24;
      --danger: #f87171;
      --danger-fg: #fecdd3;
      --danger-bg: #3b1113;
      --surface-muted: #1c2431;
      --color60: #12161d;
      --color30: #1a212b;
      --color31: #232b36;
      --color33: #2a333f;
      --color34: #3a4553;
      --color10: #4a5563;
      --color5: #8b93a1;
      --color51: #a3abb8;
      --color6: #e7ebf1;
      --color80: #1a212b;
      --color81: #7e8a99;
      --silverLightest: #171d26;
      --silverLight: #2a333f;
      --silver: #3a4553;
      --silverDark: #5a6472;
      --silverDarkest: #8b93a1;
      --colorTheme: #7db0ff;
      --color1: #7db0ff;
      --color2: #24405f;
      --color3: #6ea8ff;
      --colorPrimaryLight: #5b9bff;
      --colorPrimaryDark: #6ea8ff;
      --primary: #5b9bff;
      --primaryBg: #14243a;
      --primaryBorder: #3a6bb5;
      --primaryText: #bcd6ff;
      --info: #3bc4da;
      --infoBg: #0e2a30;
      --infoBorder: #1c6b78;
      --infoText: #a5e5ee;
      --success: #3fbf5f;
      --successBg: #12291a;
      --successBorder: #2e7d46;
      --successText: #a7e0b8;
      --warning: #f5b95c;
      --warningBg: #2e2410;
      --warningBorder: #a5721f;
      --warningText: #f0d29a;
      --attention: #f26b74;
      --attentionBg: #2e1215;
      --attentionBorder: #a83843;
      --attentionText: #f7c3c8;
      --gray900: #e7ebf1;
      --gray700: #c2c8d0;
      --gray600: #aab1bd;
      --gray500: #949cab;
      --gray400: #7e8794;
      --gray300: #6d7684;
      --gray200: #2a333f;
      --gray100: #1c232d;
      --gray50: #161c24;
      --accentBlueSoft: #16273d;
      --accentBlueHover: #14202f;
      --accentBlueBorder: #2f4b6b;
      --indicatorPosted: #2dd4a0;
      --indicatorMuted: #6d7684;
      --successGradFrom: #34d399;
      --successGradTo: #10b981;
      --successSoftBg: #0f2a1c;
      --successSoftBorder: #2e7d52;
      --warnAccent: #f59e0b;
      --warnSoftBg: #2a2410;
      --warnSoftBorder: #6b5a1f;
      --warnSoftText: #f0c088;
    }
  }
  :root[data-theme="dark"] {
    --color-link: #6ea8ff;
    --text-secondary: #c2c8d0; --text-muted: #8b93a1; --text-faint: #5f6773;
    --success: #4ade80; --success-fg: #bbf7d0; --success-bg: #123222;
    --warning: #f59e0b; --warning-strong: #fbbf24;
    --danger: #f87171; --danger-fg: #fecdd3; --danger-bg: #3b1113;
    --surface-muted: #1c2431;
    --color60: #12161d;
    --color30: #1a212b;
    --color31: #232b36;
    --color33: #2a333f;
    --color34: #3a4553;
    --color10: #4a5563;
    --color5: #8b93a1;
    --color51: #a3abb8;
    --color6: #e7ebf1;
    --color80: #1a212b;
    --color81: #7e8a99;
    --silverLightest: #171d26;
    --silverLight: #2a333f;
    --silver: #3a4553;
    --silverDark: #5a6472;
    --silverDarkest: #8b93a1;
    --colorTheme: #7db0ff;
    --color1: #7db0ff;
    --color2: #24405f;
    --color3: #6ea8ff;
    --colorPrimaryLight: #5b9bff;
    --colorPrimaryDark: #6ea8ff;
    --primary: #5b9bff;
    --primaryBg: #14243a;
    --primaryBorder: #3a6bb5;
    --primaryText: #bcd6ff;
    --info: #3bc4da;
    --infoBg: #0e2a30;
    --infoBorder: #1c6b78;
    --infoText: #a5e5ee;
    --success: #3fbf5f;
    --successBg: #12291a;
    --successBorder: #2e7d46;
    --successText: #a7e0b8;
    --warning: #f5b95c;
    --warningBg: #2e2410;
    --warningBorder: #a5721f;
    --warningText: #f0d29a;
    --attention: #f26b74;
    --attentionBg: #2e1215;
    --attentionBorder: #a83843;
    --attentionText: #f7c3c8;
    --gray900: #e7ebf1;
    --gray700: #c2c8d0;
    --gray600: #aab1bd;
    --gray500: #949cab;
    --gray400: #7e8794;
    --gray300: #6d7684;
    --gray200: #2a333f;
    --gray100: #1c232d;
    --gray50: #161c24;
    --accentBlueSoft: #16273d;
    --accentBlueHover: #14202f;
    --accentBlueBorder: #2f4b6b;
    --indicatorPosted: #2dd4a0;
    --indicatorMuted: #6d7684;
    --successGradFrom: #34d399;
    --successGradTo: #10b981;
    --successSoftBg: #0f2a1c;
    --successSoftBorder: #2e7d52;
    --warnAccent: #f59e0b;
    --warnSoftBg: #2a2410;
    --warnSoftBorder: #6b5a1f;
    --warnSoftText: #f0c088;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .loading-spinner {
    width: 36px;
    height: 36px;
    border: 3px solid #e0e0e0;
    border-top-color: #1c5fcb;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  .spinnerapp {
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #fff;
    transition: opacity 0.1s ease-in;
  }
</style>

<body>
  <div id="root">
    <div class="spinnerapp">
      <div class="loading-spinner"></div>
    </div>
  </div>

  <div id="RootPortal"></div>
  <script type="module"
    src="/src/main.tsx"></script>
</body>

</html>
