<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon"
    type="image/svg+xml"
    href="/favicon.svg" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA: приложение устанавливается на устройство и открывается в своём окне,
       без адресной строки. Офлайн уже обеспечен: service worker кэширует статику,
       данные лежат в IndexedDB (см. services/registerSW + offlineDb). -->
  <link rel="manifest"
    href="/manifest.webmanifest" />
  <meta name="theme-color"
    content="#1976D2" />
  <meta name="application-name"
    content="Учёт" />
  <!-- iOS манифест не читает: иконку и режим standalone задаём отдельно. -->
  <link rel="apple-touch-icon"
    href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable"
    content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style"
    content="default" />
  <meta name="apple-mobile-web-app-title"
    content="Учёт" />
  <title>Система автоматизированного учета</title>
  <link rel="preconnect"
    href="https://fonts.googleapis.com" />
  <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet" />
</head>
<style>
  /* Единый интерактивный синий для инлайновых стилей (var(--color-link)).
     Совпадает с $colorPrimaryDark из styles/variables.scss — источник один. */
  :root { --color-link: #1c5fcb; }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .loading-spinner {
    width: 36px;
    height: 36px;
    border: 3px solid #e0e0e0;
    border-top-color: #1c5fcb;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  .spinnerapp {
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #fff;
    transition: opacity 0.1s ease-in;
  }
</style>

<body>
  <div id="root">
    <div class="spinnerapp">
      <div class="loading-spinner"></div>
    </div>
  </div>

  <div id="RootPortal"></div>
  <script type="module"
    src="/src/main.tsx"></script>
</body>

</html>
